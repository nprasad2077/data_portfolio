<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 683" width="1200" height="683">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="nodeGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="nodeGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="683" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="683" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="1200" y2="500" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="1200" y2="400" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1000" y2="683" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="683" stroke="#94a3b8" stroke-width="0.5"/>
  </g>

  <!-- Connection lines -->
  <!-- NGINX to API instances -->
  <line x1="600" y1="280" x2="380" y2="420" stroke="#06b6d4" stroke-width="2.5" opacity="0.7" stroke-dasharray="8,4"/>
  <line x1="600" y1="280" x2="600" y2="420" stroke="#06b6d4" stroke-width="2.5" opacity="0.7" stroke-dasharray="8,4"/>
  <line x1="600" y1="280" x2="820" y2="420" stroke="#06b6d4" stroke-width="2.5" opacity="0.7" stroke-dasharray="8,4"/>
  
  <!-- API instances to PostgreSQL -->
  <line x1="380" y1="470" x2="600" y2="590" stroke="#f59e0b" stroke-width="2" opacity="0.6" stroke-dasharray="6,3"/>
  <line x1="600" y1="470" x2="600" y2="590" stroke="#f59e0b" stroke-width="2" opacity="0.6" stroke-dasharray="6,3"/>
  <line x1="820" y1="470" x2="600" y2="590" stroke="#f59e0b" stroke-width="2" opacity="0.6" stroke-dasharray="6,3"/>

  <!-- Clients to NGINX -->
  <line x1="180" y1="140" x2="540" y2="250" stroke="#8b5cf6" stroke-width="2" opacity="0.6" stroke-dasharray="6,3"/>
  <line x1="600" y1="100" x2="600" y2="230" stroke="#8b5cf6" stroke-width="2" opacity="0.6" stroke-dasharray="6,3"/>
  <line x1="1020" y1="140" x2="660" y2="250" stroke="#8b5cf6" stroke-width="2" opacity="0.6" stroke-dasharray="6,3"/>

  <!-- Prometheus connections -->
  <line x1="380" y1="445" x2="150" y2="500" stroke="#10b981" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4"/>
  <line x1="600" y1="445" x2="150" y2="500" stroke="#10b981" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4"/>
  <line x1="820" y1="445" x2="150" y2="500" stroke="#10b981" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4"/>

  <!-- Prometheus to Grafana -->
  <line x1="150" y1="540" x2="150" y2="600" stroke="#10b981" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4"/>

  <!-- Basketball Reference -->
  <line x1="1050" y1="500" x2="850" y2="450" stroke="#ef4444" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4"/>

  <!-- ===== CLIENTS (top) ===== -->
  <!-- Client 1: Web Apps -->
  <g filter="url(#shadow)">
    <rect x="110" y="90" width="140" height="70" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="180" y="120" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="11" font-weight="600">🌐 Web Apps</text>
    <text x="180" y="140" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">React, Next.js</text>
  </g>

  <!-- Client 2: Mobile -->
  <g filter="url(#shadow)">
    <rect x="530" y="50" width="140" height="70" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="600" y="80" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="11" font-weight="600">📱 Mobile Apps</text>
    <text x="600" y="100" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">iOS, Android</text>
  </g>

  <!-- Client 3: Data Science -->
  <g filter="url(#shadow)">
    <rect x="950" y="90" width="140" height="70" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="1020" y="120" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="11" font-weight="600">📊 Data Science</text>
    <text x="1020" y="140" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Python, R</text>
  </g>

  <!-- ===== NGINX LOAD BALANCER ===== -->
  <g filter="url(#shadow)">
    <rect x="480" y="230" width="240" height="80" rx="16" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <rect x="480" y="230" width="240" height="80" rx="16" fill="url(#nodeGrad1)" opacity="0.15"/>
    <text x="600" y="262" text-anchor="middle" fill="#06b6d4" font-family="system-ui" font-size="13" font-weight="700">⚡ NGINX Load Balancer</text>
    <text x="600" y="282" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11">Round-Robin • Rate Limiting</text>
    <text x="600" y="300" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">Port 8080</text>
  </g>

  <!-- ===== GO API INSTANCES ===== -->
  <!-- Instance 1 -->
  <g filter="url(#shadow)">
    <rect x="300" y="400" width="160" height="70" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="300" y="400" width="160" height="70" rx="12" fill="url(#centerGrad)" opacity="0.1"/>
    <text x="380" y="428" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="11" font-weight="600">🚀 Go Fiber API</text>
    <text x="380" y="448" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Instance 1 :5001</text>
    <text x="380" y="462" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">Swagger • Metrics</text>
  </g>

  <!-- Instance 2 -->
  <g filter="url(#shadow)">
    <rect x="520" y="400" width="160" height="70" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="520" y="400" width="160" height="70" rx="12" fill="url(#centerGrad)" opacity="0.1"/>
    <text x="600" y="428" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="11" font-weight="600">🚀 Go Fiber API</text>
    <text x="600" y="448" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Instance 2 :5002</text>
    <text x="600" y="462" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">Swagger • Metrics</text>
  </g>

  <!-- Instance 3 -->
  <g filter="url(#shadow)">
    <rect x="740" y="400" width="160" height="70" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="740" y="400" width="160" height="70" rx="12" fill="url(#centerGrad)" opacity="0.1"/>
    <text x="820" y="428" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="11" font-weight="600">🚀 Go Fiber API</text>
    <text x="820" y="448" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Instance 3 :5003</text>
    <text x="820" y="462" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">Swagger • Metrics</text>
  </g>

  <!-- ===== POSTGRESQL ===== -->
  <g filter="url(#shadow)">
    <rect x="480" y="570" width="240" height="75" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="480" y="570" width="240" height="75" rx="16" fill="url(#nodeGrad3)" opacity="0.12"/>
    <text x="600" y="600" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="13" font-weight="700">🐘 PostgreSQL 15</text>
    <text x="600" y="620" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11">GORM ORM • Indexed Queries</text>
    <text x="600" y="637" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">Players • Games • Shot Charts</text>
  </g>

  <!-- ===== PROMETHEUS + GRAFANA ===== -->
  <g filter="url(#shadow)">
    <rect x="70" y="480" width="160" height="55" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="150" y="505" text-anchor="middle" fill="#34d399" font-family="system-ui" font-size="11" font-weight="600">📈 Prometheus</text>
    <text x="150" y="523" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Metrics Collection</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="560" width="160" height="55" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="150" y="585" text-anchor="middle" fill="#34d399" font-family="system-ui" font-size="11" font-weight="600">📊 Grafana</text>
    <text x="150" y="603" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Dashboards</text>
  </g>

  <!-- ===== BASKETBALL REFERENCE ===== -->
  <g filter="url(#shadow)">
    <rect x="960" y="470" width="170" height="65" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <text x="1045" y="497" text-anchor="middle" fill="#f87171" font-family="system-ui" font-size="11" font-weight="600">🏀 Basketball Reference</text>
    <text x="1045" y="517" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Data Scraping (goquery)</text>
    <text x="1045" y="530" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">Seasons 1950–2025</text>
  </g>

  <!-- ===== TITLE ===== -->
  <text x="600" y="670" text-anchor="middle" fill="#475569" font-family="system-ui" font-size="11">NBA Statistics REST API — High-Performance Load-Balanced Architecture</text>

  <!-- ===== STATS BADGES ===== -->
  <g>
    <rect x="870" y="250" width="90" height="28" rx="14" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
    <text x="915" y="269" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="10" font-weight="600">⭐ 45+ Stars</text>
  </g>
  <g>
    <rect x="970" y="250" width="110" height="28" rx="14" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
    <text x="1025" y="269" text-anchor="middle" fill="#f97316" font-family="system-ui" font-size="10" font-weight="600">🔥 70+ Upvotes</text>
  </g>
  <g>
    <rect x="920" y="288" width="110" height="28" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
    <text x="975" y="307" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="10" font-weight="600">📬 99+ Forks</text>
  </g>

  <!-- Docker badge -->
  <g>
    <rect x="30" y="400" width="130" height="28" rx="14" fill="#1e293b" stroke="#38bdf8" stroke-width="1"/>
    <text x="95" y="419" text-anchor="middle" fill="#38bdf8" font-family="system-ui" font-size="10" font-weight="600">🐳 Dockerized</text>
  </g>
</svg>
